<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Connectosphere — 과잉 연결의 유적</title>
  <meta name="description" content="Connectosphere: Excavating the relics of hyperconnected civilization. 커넥토스피어 — 과잉 연결의 유적, 그룹 졸업 전시." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="page--main">

  <!-- ============================================
       STATE 1: TITLE SCREEN (initial view)
       ============================================ -->
  <section id="titleScreen" class="title-screen" aria-label="Title screen">
    <div class="title-screen__inner">
      <h1 class="title">
        <span class="title__main">Connectosphere</span>
        <span class="title__sub">과잉 연결의 유적</span>
      </h1>
      <button id="enterBtn" class="enter-btn" type="button" aria-label="Enter — Begin the excavation">
        <span class="enter-btn__pulse" aria-hidden="true"></span>
        <span class="enter-btn__label">ENTER</span>
      </button>
      <p class="title__caption">Project 36.5 · 2026</p>
    </div>
  </section>

  <!-- ============================================
       STATE 2: VIDEO PLAYBACK
       ============================================ -->
  <section id="videoStage" class="video-stage" aria-hidden="true">
    <video
      id="introVideo"
      class="video-stage__video"
      playsinline
      preload="auto"
      controls="false">
      <source src="0522.mp4" type="video/mp4" />
      이 브라우저는 영상 재생을 지원하지 않습니다.
    </video>
  </section>

  <!-- ============================================
       STATE 3: INTERACTIVE END FRAME
       (Final landscape with 5 clickable objects)
       ============================================ -->
  <section id="endScene" class="end-scene" aria-hidden="true" aria-label="Excavation site — five artifacts to explore">
    <img
      class="end-scene__bg"
      src="IMG_2701.PNG"
      alt="천 년 후의 발굴 현장. 다섯 개의 유물이 거대 모놀리스 앞에 놓여있다."
    />

    <!-- 5 clickable hotspots, percentage-based coordinates -->
    <!-- Each hotspot uses position:absolute with % values so it scales with the image -->

    <!-- 1. 좌측 끝 냉장고 화석 → 전시 서문 -->
    <a
      href="intro.html"
      class="hotspot hotspot--intro"
      style="left: 4%; top: 38%; width: 17%; height: 50%;"
      aria-label="전시 서문 — 냉장고 화석">
      <span class="hotspot__marker" aria-hidden="true"></span>
      <span class="hotspot__label">전시 서문</span>
    </a>

    <!-- 2. 소형 모놀리스 → 외부 데이터 페이지 -->
    <a
      id="dataHotspot"
      href="#"
      class="hotspot hotspot--data"
      style="left: 25%; top: 25%; width: 8%; height: 50%;"
      aria-label="데이터 — 관객 입력 수집">
      <span class="hotspot__marker hotspot__marker--glow" aria-hidden="true"></span>
      <span class="hotspot__label">데이터</span>
    </a>

    <!-- 3. 층상 금속 덩어리 → 로케이션 -->
    <a
      href="location.html"
      class="hotspot hotspot--location"
      style="left: 35%; top: 45%; width: 18%; height: 35%;"
      aria-label="로케이션 — 전시 장소와 일정">
      <span class="hotspot__marker" aria-hidden="true"></span>
      <span class="hotspot__label">로케이션</span>
    </a>

    <!-- 4. 칩 박힌 석조 블록 → 인트로 다시보기 -->
    <a
      href="rewatch.html"
      class="hotspot hotspot--rewatch"
      style="left: 47%; top: 70%; width: 24%; height: 22%;"
      aria-label="인트로 다시보기">
      <span class="hotspot__marker hotspot__marker--glow" aria-hidden="true"></span>
      <span class="hotspot__label">다시보기</span>
    </a>

    <!-- 5. 결정 군집 → 팀 소개 -->
    <a
      href="team.html"
      class="hotspot hotspot--team"
      style="left: 80%; top: 55%; width: 18%; height: 40%;"
      aria-label="팀 소개 — Project 36.5">
      <span class="hotspot__marker" aria-hidden="true"></span>
      <span class="hotspot__label">팀 소개</span>
    </a>
  </section>

  <script src="script.js"></script>
</body>
</html>
